<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="main.js" defer></script>
    <title>Todo App</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap");
    </style>
    <link href="./css/tailwind.css" rel="stylesheet" />
  </head>
  <body>
    <div class="todo-form">
      <h2>Get Todo</h2>
      <input type="number" id="todoGetInput" placeholder="todoGetInput" />
      <button id="todoGetButton">Get Todo</button>
      <p id="todoGetParagraph"></p>
    </div>
    <div class="todo-form">
      <h2>Post Todo</h2>
      <input
        type="number"
        id="todoPostUserIdInput"
        placeholder="todoPostUserIdInput"
      />
      <input type="checkbox" id="todoPostCompletedInput" />
      <input
        type="text"
        id="todoPostTitleInput"
        placeholder="todoPostTitleInput"
      />
      <button id="todoPostButton">Post Todo</button>
      <p id="todoPostParagraph"></p>
    </div>

    <div class="todo-form">
      <h2>Put Todo</h2>
      <input
        type="number"
        id="todoPutIdInput"
        placeholder="todoPutIdInput"
        required
      />
      <input
        type="number"
        id="todoPutUserIdInput"
        placeholder="todoPutUserIdInput"
      />
      <input type="checkbox" id="todoPutCompletedInput" />
      <input
        type="text"
        id="todoPutTitleInput"
        placeholder="todoPutTitleInput"
      />
      <button id="todoPutButton">Put Todo</button>
      <p id="todoPutParagraph"></p>
    </div>
    <div class="todo-form">
      <h2>Delete Todo</h2>
      <input
        type="number"
        id="todoDeleteIdInput"
        placeholder="todoDeleteIdInput"
      />
      <button id="todoDeleteButton">Delete Todo</button>
      <p id="todoDeleteParagraph"></p>
    </div>
  </body>
</html>
