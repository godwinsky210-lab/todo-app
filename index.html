<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="main.js" defer></script>
    <title>Todo App</title>
    <link href="./css/tailwind.css" rel="stylesheet" />
  </head>
  <body>
    <!-- GET -->
    <div>
      <h2>Get Todo</h2>
      <input type="number" id="todoGetInput" placeholder="todoGetInput" />
      <button id="todoGetButton">Get Todo</button>
      <p id="todoGetParagraph"></p>
    </div>

    <!-- POST -->
    <div>
      <h2>Post Todo</h2>
      <input type="number" id="todoPostUserIdInput" placeholder="todoPostUserIdInput" />
      <input type="text" id="todoPostTitleInput" placeholder="todoPostTitleInput" />
      <input type="checkbox" id="todoPostCompletedInput" />
      <button id="todoPostButton">Post Todo</button>
      <p id="todoPostParagraph"></p>
    </div>

    <!-- PUT -->
    <div>
      <h2>Put Todo</h2>
      <input type="number" id="todoPutIdInput" placeholder="todoPutIdInput" required />
      <input type="number" id="todoPutUserIdInput" placeholder="todoPutUserIdInput" />
      <input type="text" id="todoPutTitleInput" placeholder="todoPutTitleInput" />
      <input type="checkbox" id="todoPutCompletedInput" />
      <button id="todoPutButton">Put Todo</button>
      <p id="todoPutParagraph"></p>
    </div>

    <!-- PATCH -->
    <div>
      <h2>Patch Todo</h2>
      <input type="number" id="todoPatchIdElement" placeholder="todoPatchId" />
      <input type="number" id="todoPatchUserIdInputElement" placeholder="todoPatchUserIdInput here" />
      <input type="text" id="todoPatchTitleInput" placeholder="todoPatchTitleInput" />
      <input type="checkbox" id="todoPatchCompletedInput" />
      <button id="todoPatchButton">Patch Todo</button>
      <p id="todoPatchParagraph"></p>
    </div>

    <!-- DELETE -->
    <div>
      <h2>Delete Todo</h2>
      <input type="number" id="todoDeleteIdInput" placeholder="todoDeleteIdInput" />
      <button id="todoDeleteButton">Delete Todo</button>
      <p id="todoDeleteParagraph"></p>
    </div>
  </body>
</html>
